<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-img{
            width: 300px;
            height: 240px;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body class="bg-gray-200">
<header class="fixed top-0 left-0 w-full border-b z-9999 bg-teal-300">
    <h1 class="text-4xl font-bold text-red-600 text-center mt-3">進撃の巨人 FIGURE</h1>
    <h2 class="text-2xl font-bold text-red-500 text-center my-1">〜九つの巨人集〜</h2>
</header>
<section class="mt-28">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 odd:bg-">
        <div class="bg-white rounded-lg shadow p-3 text-center w-fit mx-auto">
            <img src="./img04/戦鎚.jpg" alt="戦鎚" class="card-img mx-auto">
            <button class="text-3xl font-bold text-emerald-500 hover:bg-orange-300">戦鎚の巨人</button>
            <h3 class="text-xl mt-1">¥200</h3>
        </div>
        <div class="bg-white rounded-lg shadow p-3 text-center w-fit mx-auto">
            <img src="./img04/進撃.jpeg" alt="進撃" class="card-img mx-auto">
            <button class="text-3xl font-bold text-emerald-500 hover:bg-orange-300">進撃の巨人</button>
            <h3 class="text-xl mt-1">¥150</h3>
        </div>
        <div class="bg-white rounded-lg shadow p-3 text-center w-fit mx-auto">
            <img src="./img04/超大型.png" alt="超大型" class="card-img mx-auto">
            <button class="text-3xl font-bold text-emerald-500 hover:bg-orange-300">超大型巨人</button>
            <h3 class="text-xl mt-1">¥400</h3>
        </div>
        <div class="bg-white rounded-lg shadow p-3 text-center w-fit mx-auto">
            <img src="./img04/顎.jpg" alt="顎" class="card-img mx-auto">
            <button class="text-3xl font-bold text-emerald-500 hover:bg-orange-300">顎の巨人</button>
            <h3 class="text-xl mt-1">¥50</h3>
        </div>
        <div class="bg-white rounded-lg shadow p-3 text-center w-fit mx-auto">
            <img src="./img04/ダウンロード.jpeg" alt="始祖" class="card-img mx-auto">
            <button class="text-3xl font-bold text-emerald-500 hover:bg-orange-300">始祖の巨人</button>
            <h3 class="text-xl mt-1">¥600</h3>
        </div>
        <div class="bg-white rounded-lg shadow p-3 text-center w-fit mx-auto">
            <img src="./img04/車力.jpeg" alt="車力" class="card-img mx-auto">
            <button class="text-3xl font-bold text-emerald-500 hover:bg-orange-300">車力の巨人</button>
            <h3 class="text-xl mt-1">¥80</h3>
        </div>
        <div class="bg-white rounded-lg shadow p-3 text-center w-fit mx-auto">
            <img src="./img04/女型.avif" alt="女型" class="card-img mx-auto">
            <button class="text-3xl font-bold text-emerald-500 hover:bg-orange-300">女型の巨人</button>
            <h3 class="text-xl mt-1">¥500</h3>
        </div>
        <div class="bg-white rounded-lg shadow p-3 text-center w-fit mx-auto">
            <img src="./img04/獣.webp" alt="獣" class="card-img mx-auto">
            <button class="text-3xl font-bold text-emerald-500 hover:bg-orange-300">獣の巨人</button>
            <h3 class="text-xl mt-1">¥10</h3>
        </div>
        <div class="bg-white rounded-lg shadow p-3 text-center w-fit mx-auto">
            <img src="./img04/鎧.webp" alt="鎧" class="card-img mx-auto">
            <ul>
            <li class="odd:bg-sky-300 even:bg-orange-200 text-3xl font-bold text-emerald-500 hover:bg-orange-300">鎧の巨人</li>
            <li class="odd:bg-sky-300 even:bg-orange-200 text-xl mt-1">¥5</li>
            </ul>
        </div>
    </div>
</section>
</body>
</html>
