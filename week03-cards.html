<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA THE MAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-img{
            width: 200px;
            height: 240px;
            object-fit: cover;
            display: block;
        }
    </style>
</head>

<body class="bg-orange-500">
<header class="fixed top-0 left-0 w-full border-b z-9999 text-5xl bg-yellow-400 flex items-center justify-center px-8 py-6">
    <h1 class="text-green-600 font-bold">NBAのLEGENDたち</h1>
</header>
<main class="mt-24">
<section class="pt-2">
<div class="flex flex-col justify-center md:flex-row m-20 gap-8">
    <div class="bg-sky-600 rounded-lg shadow-md flex flex-col mx-auto justify-center items-center w-fit hover:scale-125 transition">
        <span class="text-3xl text-center">👑</span>
        <img src="./img/leb.jpg" alt="james" class="card-img mx-auto">
        <button class="text-2xl text-center font-bold mt-2  hover:text-lime-300 transition">Lebron james</button>
    </div>
    <div class="bg-sky-600 rounded-lg shadow-md flex flex-col mx-auto justify-center items-center w-fit hover:scale-125 transition">
        <span class="text-3xl text-center">🏆</span>
        <img src="./img/スクリーンショット 2026-06-06 9.33.40.jpg" alt="jordan" class="card-img mx-auto">
        <button class="text-2xl text-center font-bold mt-2  hover:text-lime-300 transition">michel jordan</button>
    </div>
    <div class="bg-sky-600 rounded-lg shadow-md flex flex-col mx-auto justify-center items-center w-fit hover:scale-125 transition">
        <span class="text-3xl text-center">🚛</span>
        <img src="./img/shaq.webp" alt="shaq" class="card-img mx-auto">
        <button class="text-2xl text-center font-bold mt-2  hover:text-lime-300 transition">shaquille o'neal</button>
    </div>
</div>
</section>
</main>
</body>
